set -g mode-keys vi

set -g copy-command 'xsel -i'

set -g focus-events on
set -a terminal-features 'xterm-256color:RGB'

unbind -T root C-b
set -g prefix M-a
bind -T root M-a

unbind \%
unbind \"

bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"

unbind c
bind c new-window -c "#{pane_current_path}"

bind -T root M-l select-pane -R
bind -T root M-k select-pane -U
bind -T root M-j select-pane -D
bind -T root M-h select-pane -L

bind -Tcopy-mode-vi C-j               send -X copy-pipe-and-cancel 'xsel -b -i'
bind -Tcopy-mode-vi Enter             send -X copy-pipe-and-cancel 'xsel -b -i'
bind -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xsel -b -i'
